<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🕷️💙</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }.container { text-align: center; padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); max-width: 400px; width: 90%; }

h1 { font-size: 24px; }

button { margin-top: 20px; padding: 12px 25px; border: none; border-radius: 12px; background: #1e90ff; color: white; font-size: 16px; cursor: pointer; transition: 0.3s; }

button:hover { background: #187bcd; }

.hug { font-size: 90px; animation: pop 0.6s ease; }

@keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

.tag { font-size: 14px; opacity: 0.7; margin-top: 10px; } </style>

</head>
<body><div class="container" id="app">
  <h1>🕷️⚽💙</h1>
  <h1>heyyy… I've something for you 👀</h1>
  <p class="tag">spidey x neymar x lisaaa vibes</p>
  <button onclick="nextPage()">open it</button>
</div><script>
function nextPage() {
  document.getElementById('app').innerHTML = `
    <div class="hug">🫂</div>
    <h1>got you a huggg 💙</h1>
    <p>
      oye bachaaa… listen okay?<br><br>
      I know today sucked. Like properly sucked.<br>
      rejection hits different, I get it.<br><br>

      but hey… I'm alwaysss there for you 🫶<br>
      like permanently. no uninstall option.<br><br>

      and listen carefully 👇<br>
      lisaaaa teri hai… teri hi rahegi 😌<br>
      bakiii ka kyaaa… temporary characters the bas 🤡<br><br>

      tu main character hai bro.<br>
      thoda sa heartbreak arc chal raha hai bas.<br><br>

      proud of you for even trying 💙
      ab aa idhar… ek aur hug 🫂
    </p>
  `;
}
</script></body>
</html>
