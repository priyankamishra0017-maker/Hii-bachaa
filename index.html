<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surprise</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
    }
    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 90%;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff6f91;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #ff4f7b;
    }
    .hug {
      font-size: 80px;
      animation: pop 0.6s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <h2>Hey... can I ask you something? 💭</h2>
    <button onclick="nextStep()">Sure</button>
  </div>  <script>
    function nextStep() {
      document.getElementById('app').innerHTML = `
        <div class="hug">🤗</div>
        <h2>Surprise!!!</h2>
        <p>
          This is your virtual hug 💖<br><br>
          No matter what you're going through,
          just know you're appreciated,
          valued, and someone out there
          is really glad you exist.
        </p>
      `;
    }
  </script></body>
</html>
